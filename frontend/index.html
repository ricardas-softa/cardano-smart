<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardano Smart</title>

    <link rel="stylesheet" href="/css/styles.css?v=3.3">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Highlight.js Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/haskell.min.js"></script>
    <script>hljs.highlightAll();</script>
    <script src="https://kit.fontawesome.com/f30fff1d76.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="/js/thinking.js"></script>
</head>
<body>
    <header class="header" id="header-container">
        <div class="header-content">
            <img src="logo_150.png" alt="Logo" class="logo" />
            <h1>Cardano Smart <i class="fa-solid fa-robot"></i></h1>
            <span id="version-display"></span>
        </div>
    </header>
    <div class="thinking-indicator">
        <div class="spinner"></div>
        <div class="text">Thinking...</div>
    </div>
    <div class="main-wrapper">
        <div id="chatFeed">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon"><i class="fa-solid fa-robot"></i></div>
                <h2 class="welcome-title">Cardano Smart</h2>
                <p class="welcome-subtitle">AI-powered assistant for Cardano blockchain documentation</p>
                <div class="welcome-hints">
                    <p class="welcome-hint-label">Try asking:</p>
                    <button class="welcome-hint" data-question="What is Cardano?">What is Cardano?</button>
                    <button class="welcome-hint" data-question="How do I write a Plutus smart contract?">How do I write a Plutus smart contract?</button>
                    <button class="welcome-hint" data-question="What is the difference between Cardano and Ethereum?">Cardano vs Ethereum?</button>
                </div>
            </div>
        </div>
    </div>
    <div class="bottom-container">
        <form id="questionForm">
            <button type="button" class="bottom-sheet-trigger" aria-label="Open actions menu">
                <i class="fas fa-bars"></i>
            </button>
            <input type="text" id="questionInput" placeholder="Type your message here">
            <button type="submit" aria-label="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
        <div class="options-container">
            <div class="left-options">
                <button class="references-button">
                    <i class="fas fa-chevron-up"></i>
                    <span>Show References</span>
                </button>
            </div>
            <div class="right-options">
                <a class="discord-link" href="https://discord.gg/KvJMEFhGjx" target="_blank" rel="noopener">
                    <i class="fa-brands fa-discord"></i>
                    <span>Discord</span>
                </a>
                <button class="feedback-button">
                    <i class="fa-regular fa-message"></i>
                    <span>Feedback</span>
                </button>
                <button class="show-sources" onclick="window.open('sources.html', '_blank')">Sources</button>
            </div>
        </div>
    </div>
    <div class="bottom-sheet-backdrop" id="bottomSheetBackdrop"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-actions">
            <button type="button" class="bottom-sheet-btn" data-action="references">
                <i class="fas fa-chevron-up"></i>
                <span>Show References</span>
            </button>
            <a class="bottom-sheet-btn" href="https://discord.gg/KvJMEFhGjx" target="_blank" rel="noopener" data-action="discord">
                <i class="fa-brands fa-discord"></i>
                <span>Discord</span>
            </a>
            <button type="button" class="bottom-sheet-btn" data-action="feedback">
                <i class="fa-regular fa-message"></i>
                <span>Send Feedback</span>
            </button>
            <button type="button" class="bottom-sheet-btn" data-action="sources">
                <i class="fas fa-book-open"></i>
                <span>View Sources</span>
            </button>
        </div>
    </div>
    <div id="sources">
        <h2>References</h2>
        <ul id="sourceList"></ul>
    </div>
    <script src="/js/chat.js"></script>
    <script src="/js/version.js"></script>
    <script src="/js/feedback_config.js"></script>
    <script src="/js/feedback.js"></script>
    <div id="referencesPopup" class="popup">
        <div class="popup-content">
            <h2>References</h2>
            <ul id="popupSourceList"></ul>
            <button id="closeReferences" class="close-button">&times;</button>
        </div>
    </div>
    <div id="feedbackPopup" class="popup">
        <div class="popup-content feedback-content">
            <h2>Send Feedback</h2>
            <form id="feedbackForm">
                <div class="feedback-section">
                    <h3>Cardano Smart Use</h3>
                    <div class="feedback-grid">
                        <div class="feedback-field">
                            <label for="csmart_use_feedback_type">Feedback Type</label>
                            <select id="csmart_use_feedback_type" name="csmart_use_feedback_type">
                                <option value="">Select type</option>
                                <option value="Comments" selected>Comments</option>
                                <option value="Questions">Questions</option>
                                <option value="Bug Reports">Bug Reports</option>
                                <option value="Feature Request">Feature Request</option>
                            </select>
                        </div>
                        <div class="feedback-field">
                            <label for="csmart_use_feedback">Feedback</label>
                            <textarea id="csmart_use_feedback" rows="3" placeholder="Share your feedback"></textarea>
                        </div>
                        <div class="feedback-field">
                            <label for="csmart_use_suggestions">Suggestions for improvement</label>
                            <textarea id="csmart_use_suggestions" rows="3" placeholder="What would you improve?"></textarea>
                        </div>
                    </div>
                </div>

                <div class="feedback-section">
                    <h3>Bot Installation</h3>
                    <div class="feedback-grid">
                        <div class="feedback-field">
                            <label for="bot_installation_feedback_type">Feedback Type</label>
                            <select id="bot_installation_feedback_type" name="bot_installation_feedback_type">
                                <option value="">Select type</option>
                                <option value="Comments" selected>Comments</option>
                                <option value="Questions">Questions</option>
                                <option value="Bug Reports">Bug Reports</option>
                                <option value="Feature Request">Feature Request</option>
                                <option value="Problems">Problems</option>
                            </select>
                        </div>
                        <div class="feedback-field">
                            <label for="bot_installation_feedback">Feedback</label>
                            <textarea id="bot_installation_feedback" rows="3" placeholder="Share installation feedback"></textarea>
                        </div>
                        <div class="feedback-field">
                            <label for="bot_installation_suggestions">Suggestions for improvement</label>
                            <textarea id="bot_installation_suggestions" rows="3" placeholder="What would you improve?"></textarea>
                        </div>
                    </div>
                </div>

                <div class="feedback-actions">
                    <button type="submit" class="feedback-submit">Send</button>
                    <button type="button" class="feedback-cancel">Cancel</button>
                </div>
                <div id="feedbackStatus" class="feedback-status" role="status" aria-live="polite"></div>
                <p class="feedback-note">Submits to Google Forms. No account required.</p>
            </form>
            <button id="closeFeedback" class="close-button">&times;</button>
        </div>
    </div>
    <iframe id="feedbackSubmitFrame" name="feedbackSubmitFrame" title="feedback-submission" style="display:none"></iframe>
</body>
</html>
